format = '[¯éÂ](nord_cyan)[ $symbol( $context) ]($style)[¯é┤ ](nord_cyan)'

[time]
disabled = false
time_format = "%I:%M %p" # 12-hour format
style = "bg:nord_purple fg:nord_bg"
format = '[¯éÂ](nord_purple)[ ´É║ $time ]($style)[¯é┤ ](nord_purple)'

# --- 6. PROMPT CHARACTER ---
[line_break]
