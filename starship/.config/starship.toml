"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os$username$env_var\
$directory\
$git_branch$git_status\
$c$rust$golang$nodejs$php$java$kotlin$haskell$python\
$docker_context\
$time\
$line_break$character"""

palette = 'nordic'

# Official Nord Theme Hex Codes
[palettes.nordic]
nord_bg = "#2E3440"       # Polar Night (Base)
nord_pill_1 = "#3B4252"   # Polar Night (Lighter)
nord_pill_2 = "#434C5E"   # Polar Night (Lightest)
nord_pill_3 = "#4C566A"   # Polar Night (Accent)
nord_fg = "#D8DEE9"       # Snow Storm (Text)
nord_cyan = "#88C0D0"     # Frost (Primary Accent)
nord_blue = "#81A1C1"     # Frost (Secondary Accent)
nord_green = "#A3BE8C"    # Aurora (Success/Git)
nord_yellow = "#EBCB8B"   # Aurora (Warning/WSL)
nord_red = "#BF616A"      # Aurora (Error)
nord_purple = "#B48EAD"   # Aurora (Time)

# --- 1. THE HOST IDENTITY BLOCK ---
# $os and $username are physically linked because they always appear together.
[os]
disabled = false
style = "bg:nord_pill_1 fg:nord_fg"
format = '[](nord_pill_1)[$symbol](bold $style)'

[username]
show_always = true
style_user = "bg:nord_pill_1 fg:nord_fg"
style_root = "bg:nord_pill_1 fg:nord_red"
format = '[ $user ]($style)[ ](nord_pill_1)'

# 🚀 The WSL Distro Injector
# Now a completely independent pill. If not in WSL, it vanishes perfectly.
[env_var.WSL_DISTRO_NAME]
variable = "WSL_DISTRO_NAME"
style = "bg:nord_pill_2 fg:nord_yellow"
format = '[](nord_pill_2)[ $env_value ](italic $style)[ ](nord_pill_2)'

# --- 2. THE DIRECTORY BLOCK ---
[directory]
style = "bg:nord_pill_2 fg:nord_fg"
format = '[](nord_pill_2)[ $path ]($style)[ ](nord_pill_2)'
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# --- 3. THE GIT BLOCK ---
# Branch and Status are now independent pills to prevent broken edges on clean repos.
[git_branch]
symbol = ""
style = "bg:nord_pill_3 fg:nord_green"
format = '[](nord_pill_3)[ $symbol $branch ]($style)[ ](nord_pill_3)'

[git_status]
style = "bg:nord_pill_3 fg:nord_red"
format = '[](nord_pill_3)[ $all_status$ahead_behind ]($style)[ ](nord_pill_3)'

# --- 4. THE LANGUAGE BLOCKS ---
[c]
symbol = " "
style = "bg:nord_blue fg:nord_bg"
format = '[](nord_blue)[ $symbol( $version) ]($style)[ ](nord_blue)'

[rust]
symbol = ""
style = "bg:nord_blue fg:nord_bg"
format = '[](nord_blue)[ $symbol( $version) ]($style)[ ](nord_blue)'

[golang]
symbol = ""
style = "bg:nord_blue fg:nord_bg"
format = '[](nord_blue)[ $symbol( $version) ]($style)[ ](nord_blue)'

[nodejs]
symbol = ""
style = "bg:nord_blue fg:nord_bg"
format = '[](nord_blue)[ $symbol( $version) ]($style)[ ](nord_blue)'

[python]
symbol = ""
style = "bg:nord_blue fg:nord_bg"
format = '[](nord_blue)[ $symbol( $version) ]($style)[ ](nord_blue)'

[php]
symbol = ""
style = "bg:nord_blue fg:nord_bg"
format = '[](nord_blue)[ $symbol( $version) ]($style)[ ](nord_blue)'

[java]
symbol = " "
style = "bg:nord_blue fg:nord_bg"
format = '[](nord_blue)[ $symbol( $version) ]($style)[ ](nord_blue)'

# --- 5. DEVOPS & TIME ---
[docker_context]
symbol = ""
style = "bg:nord_cyan fg:nord_bg"
format = '[](nord_cyan)[ $symbol( $context) ]($style)[ ](nord_cyan)'

[time]
disabled = false
time_format = "%I:%M %p" # 12-hour format
style = "bg:nord_purple fg:nord_bg"
format = '[](nord_purple)[  $time ]($style)[ ](nord_purple)'

# --- 6. PROMPT CHARACTER ---
[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:nord_green)'
error_symbol = '[](bold fg:nord_red)'
vimcmd_symbol = '[](bold fg:nord_green)'
