"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os$username$env_var\
$directory\
$git_branch$git_status\
$c$rust$golang$nodejs$php$java$kotlin$haskell$python\
$docker_context\
$time\
$line_break$character"""

palette = 'nordic'

# Official Nord Theme Hex Codes
[palettes.nordic]
nord_bg = "#2E3440"       # Polar Night (Base)
nord_pill_1 = "#3B4252"   # Polar Night (Lighter)
nord_pill_2 = "#434C5E"   # Polar Night (Lightest)
nord_pill_3 = "#4C566A"   # Polar Night (Accent)
nord_fg = "#D8DEE9"       # Snow Storm (Text)
nord_cyan = "#88C0D0"     # Frost (Primary Accent)
nord_blue = "#81A1C1"     # Frost (Secondary Accent)
nord_green = "#A3BE8C"    # Aurora (Success/Git)
nord_yellow = "#EBCB8B"   # Aurora (Warning/WSL)
nord_red = "#BF616A"      # Aurora (Error)
nord_purple = "#B48EAD"   # Aurora (Time)

# --- 1. THE HOST IDENTITY BLOCK ---
[os]
disabled = false
style = "bg:nord_pill_1 fg:nord_fg"
format = '[¯éÂ](nord_pill_1)[$symbol](bold $style)'

[username]
show_always = true
style_user = "bg:nord_pill_1 fg:nord_fg"
style_root = "bg:nord_pill_1 fg:nord_red"
format = '[ $user ]($style)'

# ­ƒÜÇ The WSL Distro Injector
[env_var.WSL_DISTRO_NAME]
variable = "WSL_DISTRO_NAME"
style = "bg:nord_pill_1 fg:nord_yellow"
format = '[[($env_value) ](italic $style)[¯é┤ ](nord_pill_1)]($style)'
default = '[¯é┤ ](nord_pill_1)'

# --- 2. THE DIRECTORY BLOCK ---
[directory]
style = "bg:nord_pill_2 fg:nord_fg"
format = '[¯éÂ](nord_pill_2)[ $path ]($style)[¯é┤ ](nord_pill_2)'
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

# --- 3. THE GIT BLOCK ---
[git_branch]
symbol = "´Éÿ"
style = "bg:nord_pill_3 fg:nord_green"
format = '[¯éÂ](nord_pill_3)[ $symbol $branch ]($style)'

[git_status]
style = "bg:nord_pill_3 fg:nord_red"
format = '[$all_status$ahead_behind ]($style)[¯é┤ ](nord_pill_3)'

# --- 4. THE LANGUAGE BLOCKS ---
[c]
symbol = "¯ÿ× "
style = "bg:nord_blue fg:nord_bg"
format = '[¯éÂ](nord_blue)[ $symbol( $version) ]($style)[¯é┤ ](nord_blue)'

[rust]
symbol = "¯×¿"
style = "bg:nord_blue fg:nord_bg"
format = '[¯éÂ](nord_blue)[ $symbol( $version) ]($style)[¯é┤ ](nord_blue)'

[golang]
symbol = "¯ÿº"
style = "bg:nord_blue fg:nord_bg"
format = '[¯éÂ](nord_blue)[ $symbol( $version) ]($style)[¯é┤ ](nord_blue)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:nord_blue fg:nord_bg"
format = '[¯éÂ](nord_blue)[ $symbol( $version) ]($style)[¯é┤ ](nord_blue)'

[python]
symbol = "¯ÿå"
