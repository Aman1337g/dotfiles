"$schema" = 'https://starship.rs/config-schema.json'

# Global performance caps â€” prevents any module from hanging the prompt.
# Increase only if you see modules prematurely reporting timeouts.
command_timeout = 500   # ms before a module command is killed
scan_timeout    = 30    # ms for filesystem scanning per directory
add_newline     = false

# --- 0. THE GLOBAL LAYOUT ---
# No manual brackets here! The modules now contain their own containers.
format = """
$os$username$env_var\
$directory\
$git_branch$git_status\
$c$rust$golang$nodejs$php$java$kotlin$haskell$python\
$docker_context\
$time\
$line_break$character"""

palette = 'nordic'

# Official Nord Theme Hex Codes
[palettes.nordic]
nord_bg = "#2E3440"       # Polar Night (Base)
nord_pill_1 = "#3B4252"   # Polar Night (Lighter)
nord_pill_2 = "#434C5E"   # Polar Night (Lightest)
nord_pill_3 = "#4C566A"   # Polar Night (Accent)
nord_fg = "#D8DEE9"       # Snow Storm (Text)
nord_cyan = "#88C0D0"     # Frost (Primary Accent)
nord_blue = "#81A1C1"     # Frost (Secondary Accent)
nord_green = "#A3BE8C"    # Aurora (Success/Git)
nord_yellow = "#EBCB8B"   # Aurora (Warning/WSL)
nord_red = "#BF616A"      # Aurora (Error)
nord_purple = "#B48EAD"   # Aurora (Time)

# --- 1. THE HOST IDENTITY BLOCK ---
[os]
disabled = false
style = "bg:nord_pill_1 fg:nord_fg"
format = '[î‚¶](nord_pill_1)[$symbol]($style)[î‚´ ](nord_pill_1)'

[os.symbols]
Debian = "ïŒ† "
Ubuntu = "َ°•ˆ "
Windows = "َ°چ² "
Linux = "َ°Œ½ "

[username]
show_always = true
style_user = "bg:nord_pill_1 fg:nord_fg"
style_root = "bg:nord_pill_1 fg:nord_red"
format = '([î‚¶](nord_pill_1)[ $user ]($style)[î‚´ ](nord_pill_1))'

[env_var.WSL_DISTRO_NAME]
variable = "WSL_DISTRO_NAME"
style = "bg:nord_pill_2 fg:nord_yellow"
format = '([î‚¶](nord_pill_2)[ $env_value ]($style)[î‚´ ](nord_pill_2))'

# --- 2. THE DIRECTORY BLOCK ---
[directory]
style = "bg:nord_pill_2 fg:nord_fg"
format = '([î‚¶](nord_pill_2)[ $path ]($style)[î‚´ ](nord_pill_2))'
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "

# --- 3. THE GIT BLOCK ---
# Branch and Status are independent. Status only appears if there are changes.
[git_branch]
symbol = "ïگک"
style = "bg:nord_pill_3 fg:nord_green"
# Wrapped in () so it vanishes if not in a git repo
format = '([î‚¶](nord_pill_3)[ $symbol $branch ]($style)[î‚´ ](nord_pill_3))'

[git_status]
# Optimize the Git status module for large mono-repos or Windows filesystems
style = "bg:nord_pill_3 fg:nord_red"
# Wrapped in () so the pill only exists if there is actual status text
format = '([î‚¶](nord_pill_3)[ $all_status$ahead_behind ]($style)[î‚´ ](nord_pill_3))'
ignore_submodules = true

# --- 4. THE LANGUAGE BLOCKS ---
# All wrapped in () to prevent "Ghost Pills" during split screens
[c]
symbol = "îک‍ "
style = "bg:nord_blue fg:nord_bg"
format = '([î‚¶](nord_blue)[ $symbol( $version) ]($style)[î‚´ ](nord_blue))'

[rust]
symbol = "î‍¨"
style = "bg:nord_blue fg:nord_bg"
format = '([î‚¶](nord_blue)[ $symbol( $version) ]($style)[î‚´ ](nord_blue))'

[golang]
symbol = "îک§"
style = "bg:nord_blue fg:nord_bg"
format = '([î‚¶](nord_blue)[ $symbol( $version) ]($style)[î‚´ ](nord_blue))'

[nodejs]
symbol = "îœک"
style = "bg:nord_blue fg:nord_bg"
format = '([î‚¶](nord_blue)[ $symbol( $version) ]($style)[î‚´ ](nord_blue))'

[python]
symbol = "îک†"
style = "bg:nord_blue fg:nord_bg"
format = '([î‚¶](nord_blue)[ $symbol( $version)( \($virtualenv\)) ]($style)[î‚´ ](nord_blue))'
# Only show in actual Python projects â€” not in ~ where loose .py files live
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", "setup.cfg", "Pipfile", "tox.ini"]
detect_extensions = []  # Override default ["py"] â€” prevents matching loose scripts in ~
detect_folders = [".venv", "venv"]
[php]
symbol = "îکˆ"
style = "bg:nord_blue fg:nord_bg"
format = '([î‚¶](nord_blue)[ $symbol( $version) ]($style)[î‚´ ](nord_blue))'

[java]
symbol = "î‰– "
style = "bg:nord_blue fg:nord_bg"
format = '([î‚¶](nord_blue)[ $symbol( $version) ]($style)[î‚´ ](nord_blue))'
# Narrow detect_files prevents wide glob scanning on every prompt render.
# Default detect_extensions = ["kt"] scans every directory â€” override it.
[kotlin]
symbol = "َ°£؟ "
style = "bg:nord_blue fg:nord_bg"
format = '([](nord_blue)[ $symbol( $version) ]($style)[ ](nord_blue))'
detect_files      = ["build.gradle", "build.gradle.kts", "settings.gradle", "pom.xml"]
detect_extensions = []

[haskell]
symbol = " "
style = "bg:nord_blue fg:nord_bg"
format = '([](nord_blue)[ $symbol( $version) ]($style)[ ](nord_blue))'
detect_files      = ["stack.yaml", "cabal.project", "*.cabal", "package.yaml"]
detect_extensions = []
# --- 5. DEVOPS & TIME ---
[docker_context]
symbol = "ïŒˆ"
style = "bg:nord_cyan fg:nord_bg"
format = '([î‚¶](nord_cyan)[ $symbol( $context) ]($style)[î‚´ ](nord_cyan))'

[time]
disabled = false
time_format = "%I:%M %p"
style = "bg:nord_purple fg:nord_bg"
# Wrapped in () to ensure it disappears cleanly if squeezed
format = '([î‚¶](nord_purple)[ ïگ؛ $time ]($style)[î‚´ ](nord_purple))'

# --- 6. PROMPT CHARACTER ---
[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ïگ²](bold fg:nord_green)'
error_symbol = '[ïگ²](bold fg:nord_red)'
vimcmd_symbol = '[ïگ´](bold fg:nord_green)'
