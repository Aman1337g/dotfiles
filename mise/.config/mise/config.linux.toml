# ~/.config/mise/config.linux.toml  —  Linux / WSL / Alpine
# Loaded in addition to config.toml when MISE_ENV=linux.

[tools]
# Search & diff utilities
ripgrep   = "latest"
fd        = "latest"
delta     = "latest"   # git-delta: syntax-highlighted diff pager

# Editor
neovim    = "latest"

# AI / LLM CLI
opencode  = "latest"

# Infrastructure
terraform = "latest"
